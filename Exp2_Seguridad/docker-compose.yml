services:
  # ─── Infrastructure ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mysql:
    image: mysql:8.0
    container_name: security-audit-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass123
      MYSQL_DATABASE: security_audit
      MYSQL_USER: audit_user
      MYSQL_PASSWORD: secure_audit_pass_2024
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./users/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass123"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Services ──────────────────────────────────────────────────────────────
  auth:
    build:
      context: ./auth
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - STREAM_NAME=reports
      - AUTH_DB_HOST=mysql
      - AUTH_DB_PORT=3306
      - AUTH_DB_NAME=security_audit
      - AUTH_DB_USER=audit_user
      - AUTH_DB_PASSWORD=secure_audit_pass_2024
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy

  api-gateway:
    build:
      context: ./api-gateway
    restart: unless-stopped
    ports:
      - "5001:5001"
    depends_on:
      - auth
      - reservas

  reservas:
    build:
      context: ./Reservas
    restart: unless-stopped
    ports:
      - "8080:8080"

  auth-anomaly:
    build:
      context: ./Auth_Anomaly
    restart: unless-stopped
    environment:
      - AUTH_SERVICE_BASE_URL=http://auth:8080
      - AUTH_DB_HOST=mysql
      - AUTH_DB_PORT=3306
      - AUTH_DB_NAME=security_audit
      - AUTH_DB_USER=audit_user
      - AUTH_DB_PASSWORD=secure_audit_pass_2024
      - AUTH_EVENTS_DB_URL=mysql+pymysql://audit_user:secure_audit_pass_2024@mysql:3306/security_audit
      - AUTH_ANOMALIES_DB_URL=mysql+pymysql://audit_user:secure_audit_pass_2024@mysql:3306/security_audit
    volumes:
      - auth_anomaly_data:/data
    ports:
      - "6005:6005"
    depends_on:
      - auth
      - mysql

  auth-queue:
    build:
      context: ./auth-queue
    restart: unless-stopped
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - MONITOR_URL=http://auth-anomaly:6005/auth-event
      - STREAM_NAME=reports
    depends_on:
      redis:
        condition: service_healthy
      auth-anomaly:
        condition: service_started

  users:
    build:
      context: ./users
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - GATEWAY_URL=http://api-gateway:5001
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=audit_user
      - DB_PASSWORD=secure_audit_pass_2024
      - DB_NAME=security_audit
      - PORT=8081
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
  auth_anomaly_data:
